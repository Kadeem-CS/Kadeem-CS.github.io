<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Chess Game</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function ChessApp() {
  const [game, setGame] = useState(new Chess());
  const [selectedSquare, setSelectedSquare] = useState(null);
  const [optionSquares, setOptionSquares] = useState([]);
  const [whiteCaptured, setWhiteCaptured] = useState([]);
  const [blackCaptured, setBlackCaptured] = useState([]);
  const [numberedHistory, setNumberedHistory] = useState([]);

  const pieceSymbols = {
    p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚',
    P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔'
  };

  const board = game.board();

  function getSquareLabel(i, j) {
    return String.fromCharCode(97 + j) + (8 - i);
  }

  function handleSquareClick(square) {
    const gameCopy = new Chess(game.fen());

    if (selectedSquare) {
      const move = gameCopy.move({
        from: selectedSquare,
        to: square,
        promotion: 'q'
      });

      if (move) {
        setGame(gameCopy);
        setSelectedSquare(null);
        setOptionSquares([]);
        return;
      }
    }

    const piece = game.get(square);
    if (piece && piece.color === game.turn()) {
      setSelectedSquare(square);
      const moves = game.moves({ square, verbose: true });
      setOptionSquares(moves.map(m => m.to));
    } else {
      setSelectedSquare(null);
      setOptionSquares([]);
    }
  }

  const resetGame = () => {
    setGame(new Chess());
    setSelectedSquare(null);
    setOptionSquares([]);
  };

  const undoMove = () => {
    const gameCopy = new Chess(game.fen());
    gameCopy.undo();
    setGame(gameCopy);
  };

  useEffect(() => {
    const history = game.history({ verbose: true });

    // Captured pieces
    const whiteCap = history
      .filter(m => m.captured && m.color === 'b')
      .map(m => pieceSymbols[m.captured.toUpperCase()]);
    const blackCap = history
      .filter(m => m.captured && m.color === 'w')
      .map(m => pieceSymbols[m.captured.toUpperCase()]);
    setWhiteCaptured(whiteCap);
    setBlackCaptured(blackCap);

    // Numbered move history like PGN
    const numbered = [];
    for (let i = 0; i < history.length; i += 2) {
      const moveNumber = Math.floor(i / 2) + 1;
      const whiteMove = history[i]?.san || '';
      const blackMove = history[i+1]?.san || '';
      numbered.push(`${moveNumber}. ${whiteMove}${blackMove ? ' ' + blackMove : ''}`);
    }
    setNumberedHistory(numbered);
  }, [game]);

  const status = () => {
    if (game.in_checkmate()) return `Checkmate! ${game.turn() === 'w' ? 'Black' : 'White'} wins.`;
    if (game.in_draw()) return "Draw!";
    return `${game.turn() === 'w' ? "White's" : "Black's"} Turn`;
  };

  return (
    <div className="flex flex-col items-center gap-6">
      <h1 className="text-3xl font-bold text-yellow-500">React Chess Game</h1>
      <p className={`text-lg font-medium ${game.in_check() ? 'text-red-500 animate-pulse' : 'text-gray-300'}`}>
        {status()}
      </p>

      <div className="flex gap-6">
        {/* Chessboard */}
        <div className="grid grid-cols-8 border-4 border-yellow-500 shadow-2xl">
          {board.map((row, i) =>
            row.map((square, j) => {
              const label = getSquareLabel(i, j);
              const isDark = (i + j) % 2 === 1;
              const isSelected = selectedSquare === label;
              const isOption = optionSquares.includes(label);

              return (
                <div
                  key={label}
                  onClick={() => handleSquareClick(label)}
                  className={`w-16 h-16 md:w-20 md:h-20 flex items-center justify-center text-4xl cursor-pointer relative
                      ${isDark ? 'bg-gray-700' : 'bg-gray-300'}
                      ${isSelected ? 'ring-4 ring-yellow-400' : ''}
                  `}
                >
                  {isOption && (
                    <div className="absolute w-4 h-4 bg-black/30 rounded-full z-0"></div>
                  )}
                  <span className={`z-10 select-none ${square?.color === 'w' ? 'text-white drop-shadow-md' : 'text-black'}`}>
                    {square ? pieceSymbols[square.color === 'w' ? square.type.toUpperCase() : square.type] : ''}
                  </span>
                </div>
              );
            })
          )}
        </div>

        {/* Side Panel */}
        <div className="flex flex-col gap-4 w-52 text-black">
          <div className="bg-gray-200 p-2 rounded">
            <h2 className="font-bold text-center mb-1">White Captured</h2>
            <div className="flex flex-wrap">{whiteCaptured}</div>
          </div>
          <div className="bg-gray-200 p-2 rounded">
            <h2 className="font-bold text-center mb-1">Black Captured</h2>
            <div className="flex flex-wrap">{blackCaptured}</div>
          </div>
          <div className="bg-gray-200 p-2 rounded max-h-64 overflow-auto">
            <h2 className="font-bold text-center mb-1">Move History</h2>
            <ol className="text-sm list-decimal ml-4">
              {numberedHistory.map((m, i) => <li key={i}>{m}</li>)}
            </ol>
          </div>
          <div className="flex flex-col gap-2 mt-2">
            <button onClick={resetGame} className="bg-red-600 hover:bg-red-500 px-4 py-2 rounded font-bold shadow-lg">New Game</button>
            <button onClick={undoMove} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold shadow-lg">Undo</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ChessApp />);
</script>
</body>
</html>
